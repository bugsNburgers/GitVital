<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 110" role="img" aria-labelledby="title desc">
  <title id="title">GitVital logo</title>
  <desc id="desc">Orange circular pulse icon with GitVital wordmark</desc>

  <defs>
    <linearGradient id="gv-arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA066"/>
      <stop offset="100%" stop-color="#FF5E00"/>
    </linearGradient>
    <linearGradient id="gv-pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA066"/>
      <stop offset="100%" stop-color="#FF5E00"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(0,0)">
    <path d="M27,39 A26,26 0 1,1 63,76" fill="none" stroke="url(#gv-arc)" stroke-width="4" stroke-linecap="round"/>

    <line x1="16.0" y1="64.8" x2="11.2" y2="66.1" stroke="#FF8A3D" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
    <line x1="15.5" y1="51.8" x2="10.5" y2="50.9" stroke="#FF8A3D" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
    <line x1="20.4" y1="39.8" x2="16.3" y2="36.9" stroke="#FF8A3D" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
    <line x1="30.0" y1="31.0" x2="27.5" y2="26.7" stroke="#FF8A3D" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
    <line x1="42.4" y1="27.1" x2="42.0" y2="22.1" stroke="#FF8A3D" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>

    <polyline points="31,57 38,57 40,54 43,39 46,67 50,57 58,57 62,50 66,57 79,57"
      fill="none" stroke="url(#gv-pulse)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="96" y="70" font-family="Geist, system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="800" letter-spacing="-0.04em">
    <tspan fill="#F4F4F5">Git</tspan><tspan fill="#FF7A26">Vital</tspan>
  </text>
</svg>
